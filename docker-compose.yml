services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atm
      POSTGRES_PASSWORD: atm
      POSTGRES_DB: atm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    env_file: ./.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  celery_worker:
    build: ./backend
    command: celery -A config worker -l info
    env_file: ./.env
    volumes:
      - ./backend:/app
    depends_on:
      - backend

  celery_beat:
    build: ./backend
    command: celery -A config beat -l info
    env_file: ./.env
    volumes:
      - ./backend:/app
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file: ./.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5173"

  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
